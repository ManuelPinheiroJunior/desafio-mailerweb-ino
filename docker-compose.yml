services:
  db:
    image: postgres:16-alpine
    container_name: meeting_room_db
    environment:
      POSTGRES_DB: meeting_room
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meeting_room"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: meeting_room_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: meeting-room-backend
      ENVIRONMENT: docker
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/meeting_room
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      ADMIN_EMAIL: admin@company.local
      WORKER_POLL_INTERVAL_SECONDS: "3"
      WORKER_BATCH_SIZE: "20"
      WORKER_MAX_BACKOFF_SECONDS: "1800"
      WORKER_PROCESSING_TIMEOUT_SECONDS: "300"
      EMAIL_SENDER_ADDRESS: no-reply@meeting-room.local
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
    container_name: meeting_room_worker
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      APP_NAME: meeting-room-backend
      ENVIRONMENT: docker
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/meeting_room
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      ADMIN_EMAIL: admin@company.local
      WORKER_POLL_INTERVAL_SECONDS: "3"
      WORKER_BATCH_SIZE: "20"
      WORKER_MAX_BACKOFF_SECONDS: "1800"
      WORKER_PROCESSING_TIMEOUT_SECONDS: "300"
      EMAIL_SENDER_ADDRESS: no-reply@meeting-room.local
    command: ["python", "-m", "app.workers.outbox_worker"]

  frontend:
    build:
      context: ./frontend
    container_name: meeting_room_frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"

volumes:
  pg_data:
